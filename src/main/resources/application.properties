spring.application.name=FileSystem


spring.datasource.url=jdbc:postgresql://localhost:5432/ArchivingFileSystem_db
spring.datasource.username=postgres
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET}
#15min
jwt.access-expiration=900000
#7 days
jwt.refresh-expiration=604800000
#30 days
jwt.remember-me-expiration= 2592000000

logging.level.org.springframework.transaction=TRACE
logging.level.org.hibernate=ERROR
server.error.include-stacktrace=always

logging.level.org.springframework.orm.jpa=DEBUG
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=ERROR

logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=TRACE